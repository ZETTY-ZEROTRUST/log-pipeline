# ZETI Nginx PEP — priv-web 양쪽 공통 (v11 통합본)
#
# ★ 단일 source of truth (2026-05-15 결정). 2a/2b 분기 폐기.
#   priv-web-2a (10.0.11.31, i-0d65d23cec86d70a1) + priv-web-2b (10.0.12.162, i-006d3da2a9558e048) 양쪽에 동일 파일 배포.
#   머신 식별 인사말 / proxy_pass IP 분기 모두 제거. upstream 블록으로 양 AZ priv-app 통합 라우팅.
#
# 역할:
#   - PEP (Policy Enforcement Point). ALB → 이 nginx → priv-app (Auth :8080 / API :8081)
#   - access.log = JSON (log_format uba_log) → Filebeat tail → ES ingest (asn-classify) → filebeat-* 색인 (composable template filebeat-jwt, priority 500)
#   - JWT 분해는 Filebeat script processor 담당 (v11, 5/15 분담 변경)
#
# 배포:
#   sudo cp uba.conf /etc/nginx/conf.d/uba.conf
#   sudo nginx -t && sudo nginx -s reload
#
# O1 대비 (토큰 평문 디스크 잔존):
#   - uba.log 권한 현재 640 → 운영 이전 시 600 으로 조정 (root 만 read)
#   - logrotate 일 단위 작동 확인 (5/15 시점 uba.log → uba.log.1 → uba.log.2.gz ... ~14일 누적)
#
# 다른 산출물과의 계약 (필드명 변경 시 동시 정정):
#   - log-pipeline/filebeat/filebeat-priv-web.yml — processors (event.Get("jwt") 가정)
#   - log-pipeline/es-pipelines/asn-classify.json — client_ip 추출, x_forwarded_for 첫 IP
#   - log-pipeline/es-mappings/filebeat-jwt-template.json — 필드명 7개 + jwt nested 매핑
#
# cross-AZ 트래픽 노트:
#   각 priv-web nginx 가 양 AZ priv-app 으로 round-robin → cross-AZ 트래픽 ~50%.
#   AWS 데이터 전송 비용/레이턴시 측면에서는 same-AZ 우선이 좋으나, 시연용 + nginx upstream
#   의 동적 fallback (한 priv-app 다운 시 자동 mark down) 가치가 더 크다고 판단.
#   운영 이전 시 ALB target group 으로 분리하거나 Route 53 private zone + DNS round-robin
#   고려.

# === log_format: UBA용 JSON 포맷 (실 머신 5/4 배포본과 동일) ===
# 필드 9개. JWT 필드명은 'jwt' (= nginx $http_authorization).
log_format uba_log escape=json '{"time":"$time_iso8601","ip":"$remote_addr","x_forwarded_for":"$http_x_forwarded_for","jwt":"$http_authorization","method":"$request_method","uri":"$request_uri","status":"$status","bytes_sent":"$body_bytes_sent","response_time":"$request_time"}';

# === upstream: priv-app 양 AZ 통합 (nginx-sg → app-sg 8080/8081 SG 체인이 cross-AZ 허용) ===
upstream zeti_auth {
    server 10.0.21.62:8080;    # priv-app-2a Auth
    server 10.0.22.106:8080;   # priv-app-2b Auth
    # 기본 동작: round-robin + fail_timeout 10s. 한 priv-app down 시 자동 fallback.
}

upstream zeti_api {
    server 10.0.21.218:8081;   # priv-app-2a API
    server 10.0.22.175:8081;   # priv-app-2b API
}

server {
    listen 80;
    access_log /var/log/nginx/uba.log uba_log;
    error_log  /var/log/nginx/error.log;

    # /auth/ → priv-app Auth (양 AZ round-robin)
    location /auth/ {
        proxy_pass http://zeti_auth;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
    }

    # /api/ → priv-app API (양 AZ round-robin)
    location /api/ {
        proxy_pass http://zeti_api/;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
    }

    # /healthz → priv-app 의 /healthz proxy (backend 살아있는지 검증)
    # ★ Host 헤더 명시 (없으면 default 가 upstream 이름 'zeti_api' → backend Host validation 400)
    location /healthz {
        proxy_pass http://zeti_api/healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # / → 머신 분기 없는 통합 응답 (ALB target health check 도 사용 가능)
    location / {
        return 200 'nginx-pep running';
        add_header Content-Type text/plain;
    }
}
