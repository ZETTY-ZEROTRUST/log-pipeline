# ZETI Nginx PEP — UBA 데이터 파이프라인용 access.log 포맷 (v11)
#
# 역할:
#   - 리버스 프록시 (PEP) — ALB → 이 nginx → priv-app (Auth :8001 / API :8002)
#   - access.log를 JSON 포맷으로 박기 → Filebeat가 raw 파싱 → ES ingest pipeline (jwt-decode + asn-classify) → filebeat-* 색인
#
# 배치 위치: priv-web-2a (10.0.11.x) + priv-web-2b (10.0.12.x), AWS Session Manager로 SSM 접속해서 /etc/nginx/conf.d/uba.conf로 배치
#
# Reload 절차:
#   sudo nginx -t                # 문법 검증
#   sudo nginx -s reload         # 무중단 reload
#
# O1 대비 (토큰 평문 디스크 잔존 위험):
#   - access.log 권한 600 (root만 read)
#   - logrotate 1일 정책 (별도 /etc/logrotate.d/nginx 설정 필요)
#   - 시연 종료 후 access.log 완전 삭제 절차 명시

# === log_format: UBA용 JSON 포맷 ===
# escape=json — JSON 인용부/특수문자 자동 이스케이프. Filebeat가 line별 raw JSON으로 파싱 가능.
# $http_authorization 포함 — Bearer 토큰을 jwt-decode pipeline에서 분해. ES 색인 시 remove processor가 평문 제거하므로 ES 인덱스에는 박히지 않음.
log_format uba_json escape=json
    '{'
        '"@timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_user_agent":"$http_user_agent",'
        '"http_referer":"$http_referer",'
        '"http_authorization":"$http_authorization"'
    '}';

# === server block ===
server {
    listen 80;
    server_name _;

    # === access.log: UBA용 JSON 포맷 + 권한 600 ===
    # /var/log/nginx/access.log — Filebeat가 이 파일 tail
    access_log /var/log/nginx/access.log uba_json;
    error_log /var/log/nginx/error.log warn;

    # === PEP 본 역할: ALB → priv-app upstream 프록시 ===
    # 의도된 패턴: nginx는 인증/인가 검증 안 하고 그대로 forward (Spring 측이 KMS 검증)
    location /auth/ {
        proxy_pass http://10.0.21.10:8001;     # Auth-2a (Multi-AZ에서 ALB가 분산)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/ {
        proxy_pass http://10.0.21.10:8002;     # API-2a
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # 헬스체크 (ALB target health)
    location /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
